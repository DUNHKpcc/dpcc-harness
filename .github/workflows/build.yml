name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Clean existing release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $TAG exists, deleting all assets to avoid upload conflicts..."
            gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets -q '.assets[].name' | while read -r asset; do
              echo "Deleting: $asset"
              gh release delete-asset "$TAG" "$asset" --repo "$GITHUB_REPOSITORY" --yes || true
            done
          else
            echo "No existing release for $TAG, nothing to clean"
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test

  ensure-release:
    needs: [prepare-release, test]
    if: ${{ startsWith(github.ref, 'refs/tags/v') && needs.test.result == 'success' && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" &>/dev/null; then
            echo "Release $TAG already exists"
            exit 0
          fi

          PREV_TAG=$(gh release list --repo "$GITHUB_REPOSITORY" --limit 20 --json tagName --jq "[.[].tagName | select(. != \"$TAG\")][0] // \"\"")

          cat > release-notes.md <<EOF
          ## Changes

          ### Bug Fixes
          - Fixed Windows release builds by bundling the Codex arm64 binary target.
          - Preserved the correct bundled Codex vendor directory for Windows arm64 packages.
          - Kept the composer file picker attachment fix from the current master build.

          ### Tests
          - Added regression coverage for Windows arm64 Codex bundle target mapping and packaging cleanup.
          EOF

          if [ -n "$PREV_TAG" ]; then
            cat >> release-notes.md <<EOF

          ---

          **Full Changelog**: https://github.com/DUNHKpcc/dpcc-harness/compare/${PREV_TAG}...${TAG}
          EOF
          fi

          gh release create "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$TAG — Codex Windows Bundle Fixes" \
            --notes-file release-notes.md

  # macOS: build both arm64 + x64 in one job so electron-builder writes a single
  # latest-mac.yml containing both architectures. Separate jobs race and the last
  # one to finish overwrites the other's YAML → wrong arch served to half the users.
  build-mac:
    needs: [prepare-release, test, ensure-release]
    if: ${{ always() && needs.test.result == 'success' && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') && (needs.ensure-release.result == 'success' || needs.ensure-release.result == 'skipped') }}
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build app
        run: pnpm build

      - name: Bundle Codex (darwin arm64 + x64)
        run: node scripts/bundle-codex.js --triples aarch64-apple-darwin,x86_64-apple-darwin

      - name: Package (mac arm64 + x64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: >
          pnpm exec electron-builder
          --mac
          --arm64 --x64
          --config electron-builder.config.js
          --publish never

      - name: Publish selected macOS assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME}"
          DIR="release/${VERSION}"
          for file in "${DIR}"/*.dmg "${DIR}"/*.zip "${DIR}"/latest-mac.yml; do
            if [ -f "$file" ]; then
              echo "Uploading: $(basename "$file")"
              gh release upload "$TAG" "$file" --clobber
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PccAgent-mac
          path: |
            release/**/*.dmg
            release/**/*.zip
            release/**/latest-mac.yml
          retention-days: 30

  # Windows: same approach as macOS — one job builds both arches so electron-builder
  # writes a single latest.yml with both installers listed.
  build-win:
    needs: [prepare-release, test, ensure-release]
    if: ${{ always() && needs.test.result == 'success' && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') && (needs.ensure-release.result == 'success' || needs.ensure-release.result == 'skipped') }}
    # Pin to windows-2022 (VS 2022). windows-latest now ships VS 2026, which
    # node-gyp 11 can't detect → node-pty fails to compile during packaging.
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Strip mac-only native dependency from Windows CI manifest
        shell: bash
        run: |
          # electron-builder rebuilds native prod deps during packaging.
          # On Windows, remove the macOS-only electron-liquid-glass package so
          # @electron/rebuild never tries to compile Objective-C++ sources.
          # Also drop the root postinstall because this CI job does not need
          # the repo's dev-focused rebuild hook.
          node -e "const fs=require('fs'); const pkg=require('./package.json'); delete pkg.scripts.postinstall; delete pkg.dependencies['electron-liquid-glass']; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Bundle Codex (win x64 + arm64)
        run: node scripts/bundle-codex.js --triples x86_64-pc-windows-msvc,aarch64-pc-windows-msvc

      - name: Package (win x64 + arm64)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          pnpm exec electron-builder
          --win
          --x64 --arm64
          --config electron-builder.config.js
          --publish never

      - name: Publish selected Windows assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME}"
          DIR="release/${VERSION}"
          for file in "${DIR}"/*.exe "${DIR}"/latest.yml; do
            if [ -f "$file" ]; then
              echo "Uploading: $(basename "$file")"
              gh release upload "$TAG" "$file" --clobber
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PccAgent-win
          path: |
            release/**/*.exe
            release/**/latest.yml
          retention-days: 30

  # Linux: can't use --x64 --arm64 in one invocation (AppImage builder tries to
  # access cross-arch vendor binaries that don't exist in the other arch's staging
  # dir). Build sequentially, then merge latest-linux.yml before publishing.
  build-linux:
    needs: [prepare-release, test, ensure-release]
    if: ${{ always() && needs.test.result == 'success' && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') && (needs.ensure-release.result == 'success' || needs.ensure-release.result == 'skipped') }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3 libsecret-1-dev libnotify-dev

      - name: Strip mac-only native dependency from Linux CI manifest
        shell: bash
        run: |
          # electron-builder rebuilds native prod deps during packaging.
          # On Linux, remove the macOS-only electron-liquid-glass package so
          # @electron/rebuild never tries to compile Objective-C++ sources.
          # Also drop the root postinstall because this CI job does not need
          # the repo's dev-focused rebuild hook.
          node -e "const fs=require('fs'); const pkg=require('./package.json'); delete pkg.scripts.postinstall; delete pkg.dependencies['electron-liquid-glass']; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build app
        run: pnpm build

      - name: Bundle Codex (linux x64 + arm64)
        run: node scripts/bundle-codex.js --triples x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - name: Package (linux x64)
        run: >
          pnpm exec electron-builder
          --linux --x64
          --config electron-builder.config.js
          --publish never

      - name: Save x64 update manifest
        run: cp release/*/latest-linux.yml latest-linux-x64.yml 2>/dev/null || true

      - name: Package (linux arm64)
        run: >
          pnpm exec electron-builder
          --linux --arm64
          --config electron-builder.config.js
          --publish never

      - name: Merge update manifests
        run: |
          VERSION=$(node -p "require('./package.json').version")
          DIR="release/${VERSION}"
          # arm64 build overwrites latest-linux.yml — merge x64 entries back in
          if [ -f "latest-linux-x64.yml" ] && [ -f "${DIR}/latest-linux.yml" ]; then
            yq eval-all '
              select(fileIndex == 0).files += select(fileIndex == 1).files
              | select(fileIndex == 0)
            ' latest-linux-x64.yml "${DIR}/latest-linux.yml" > "${DIR}/latest-linux-merged.yml"
            mv "${DIR}/latest-linux-merged.yml" "${DIR}/latest-linux.yml"
          elif [ -f "latest-linux-x64.yml" ]; then
            cp latest-linux-x64.yml "${DIR}/latest-linux.yml"
          fi

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME}"
          DIR="release/${VERSION}"
          for file in "${DIR}"/*.AppImage "${DIR}"/*.deb "${DIR}"/latest-linux.yml; do
            if [ -f "$file" ]; then
              echo "Uploading: $(basename "$file")"
              gh release upload "$TAG" "$file" --clobber || true
            fi
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PccAgent-linux
          path: |
            release/**/*.AppImage
            release/**/*.deb
            release/**/latest-linux.yml
          retention-days: 30
