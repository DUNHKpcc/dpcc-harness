<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PccAgent</title>
    <style>
      html, body {
        background-color: transparent !important;
      }
    </style>
    <!-- Apply theme class before first paint to prevent flash of wrong theme.
         Runs after <html> exists but before CSS renders the first frame. -->
    <script>
      (function() {
        var stored;
        try {
          var persisted = localStorage.getItem("pcc-agent-settings-store");
          if (persisted) {
            var parsed = JSON.parse(persisted);
            var candidate = parsed && parsed.state && parsed.state.theme;
            if (candidate === "light" || candidate === "dark" || candidate === "system") {
              stored = candidate;
            }
          }
        } catch (_) {}
        if (!stored) {
          try {
            var legacy = localStorage.getItem("pcc-agent-theme");
            if (legacy === "light" || legacy === "dark" || legacy === "system") stored = legacy;
          } catch (_) {}
        }
        var isDark = stored === "light"
          ? false
          : stored === "system"
            ? window.matchMedia("(prefers-color-scheme: dark)").matches
            : true;
        document.documentElement.classList.toggle("dark", isDark);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
